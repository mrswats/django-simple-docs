---
name: Build Docker Image

on:
  push:
    paths:
      - Dockerfile
    branches:
      - "main"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@789f68658055d3ca993799b232b5c46dfe3f114d
        with:
          context: .
          push: false
          tags: latest
