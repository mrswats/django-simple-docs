---
name: Build Docker Image

on:
  push:
    paths:
      - Dockerfile
    branches:
      - "main"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v7

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@cb941d0b895b09c17fa011d41c411b33c752cf28
        with:
          context: .
          push: false
          tags: latest
