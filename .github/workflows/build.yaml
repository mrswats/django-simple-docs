---
name: Build Docker Image

on:
  push:
    paths:
      - Dockerfile
    branches:
      - "main"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v7

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@ff26911fd365b0233252dfbd8eede1c0e9ef9a51
        with:
          context: .
          push: false
          tags: latest
